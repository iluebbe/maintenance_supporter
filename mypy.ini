[mypy]
python_version = 3.14
explicit_package_bases = True
strict = True
warn_return_any = True
warn_unused_configs = True

[mypy-maintenance_supporter.websocket.*]
; HA websocket_api stubs do not export decorators/classes (websocket_command,
; async_response, ActiveConnection, event_message) that are valid at runtime.
ignore_errors = True

[mypy-custom_components.maintenance_supporter.websocket.*]
; Same exclusion for when tests import via full package path.
ignore_errors = True

[mypy-maintenance_supporter.helpers.qrcodegen]
; Vendored MIT library (Project Nayuki) — not modified.
ignore_errors = True

[mypy-custom_components.maintenance_supporter.helpers.qrcodegen]
; Same exclusion for full package path.
ignore_errors = True

; --- Dev utility scripts (not pytest tests) ---
[mypy-tests.enrich_test_data]
ignore_errors = True

[mypy-tests.inject_test_statistics]
ignore_errors = True

[mypy-tests.setup_adaptive_test_data]
ignore_errors = True

[mypy-tests.debug_ws]
ignore_errors = True

[mypy-tests.check_adaptive]
ignore_errors = True

[mypy-tests.check_all_history]
ignore_errors = True

[mypy-tests.check_history]
ignore_errors = True
