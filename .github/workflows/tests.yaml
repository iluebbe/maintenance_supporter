name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-homeassistant-custom-component mypy
      - name: Type check (source)
        run: mypy custom_components/maintenance_supporter/ --config-file mypy.ini
      - name: Type check (tests)
        run: mypy tests/ --config-file mypy.ini --ignore-missing-imports --no-warn-unused-ignores
      - name: Run tests
        run: pytest tests/ -v --cov=custom_components/maintenance_supporter --cov-report=term-missing
