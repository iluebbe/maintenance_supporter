name: Tests

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Validate Python syntax
        run: |
          echo "Checking all Python files for syntax errors..."
          find custom_components/ -name "*.py" -exec python -m py_compile {} +
          echo "All Python files are syntactically valid."

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        working-directory: custom_components/maintenance_supporter/frontend-src
        run: npm ci
      - name: Build frontend
        working-directory: custom_components/maintenance_supporter/frontend-src
        run: node esbuild.mjs
      - name: Verify build output exists
        run: |
          test -f custom_components/maintenance_supporter/frontend/maintenance-panel.js || { echo "FAIL: maintenance-panel.js not built"; exit 1; }
          test -f custom_components/maintenance_supporter/frontend/maintenance-card.js || { echo "FAIL: maintenance-card.js not built"; exit 1; }
          echo "Frontend build OK"

  pytest:
    runs-on: ubuntu-latest
    needs: [syntax-check, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-homeassistant-custom-component mypy
      - name: Type check
        run: mypy custom_components/maintenance_supporter/ --config-file mypy.ini
      - name: Run tests
        run: pytest tests/ -v --cov=custom_components/maintenance_supporter --cov-report=term-missing
