name: Tests

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Validate Python syntax
        run: |
          echo "Checking all Python files for syntax errors..."
          find custom_components/ -name "*.py" -exec python -m py_compile {} +
          echo "All Python files are syntactically valid."

  pytest:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-homeassistant-custom-component mypy
      - name: Type check
        run: mypy custom_components/maintenance_supporter/ --config-file mypy.ini
      - name: Run tests
        run: pytest tests/ -v --cov=custom_components/maintenance_supporter --cov-report=term-missing
