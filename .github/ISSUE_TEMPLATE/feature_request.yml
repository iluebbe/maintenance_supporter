name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! A clear use-case helps a lot more than a wish-list.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the underlying need. ("I want to be reminded when…", "It's hard to do X because…")
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: How would you imagine the feature working in the panel / config flow / automation?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing features, workarounds, other integrations — and why they don't fit.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Just for me / niche
        - Common case (likely useful to many users)
        - Required to use the integration
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing open and closed issues for similar requests.
          required: true
